name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile name (e.g. Dockerfile.lit-llm)'
        required: true
      tag:
        description: 'Image tag (e.g. lit-llm:amd64)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build --platform linux/amd64 \
            -f containers/${{ github.event.inputs.dockerfile }} \
            -t ${{ vars.DOCKERHUB_REPO }}/${{ github.event.inputs.tag }} \
            .
          docker push ${{ vars.DOCKERHUB_REPO }}/${{ github.event.inputs.tag }}
